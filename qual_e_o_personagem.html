
<style>
*{box-sizing:border-box;margin:0;padding:0}
#gw{padding:1rem 0;font-family:var(--font-sans)}

.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.badge{font-size:12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:4px 10px;color:var(--color-text-secondary)}

.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.pcard{
  border:1.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);
  padding:10px 6px;text-align:center;cursor:default;
  transition:all .2s;position:relative;background:var(--color-background-primary)
}
.pcard.alive{border-color:var(--color-border-tertiary)}
.pcard.eliminated{opacity:.22;filter:grayscale(1)}
.pcard.guessing{border-color:#C8102E;border-width:2px}
.pcard .avatar{font-size:28px;margin-bottom:4px;display:block}
.pcard .pname{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.pcard .ptag{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.pcard .elim-x{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:0;transition:opacity .2s}
.pcard.eliminated .elim-x{opacity:1}

.chat-area{
  border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);
  background:var(--color-background-secondary);
  height:200px;overflow-y:auto;padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;margin-bottom:10px;
  scroll-behavior:smooth
}
.msg{display:flex;gap:8px;align-items:flex-start;max-width:90%}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.bubble{
  padding:7px 12px;border-radius:12px;font-size:13px;line-height:1.5;
  color:var(--color-text-primary);background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary)
}
.msg.ai .bubble{background:var(--color-background-primary)}
.msg.user .bubble{background:#C8102E;color:#fff;border-color:#C8102E}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}

.input-area{display:flex;gap:8px;margin-bottom:10px}
.input-area input{flex:1;padding:8px 12px;font-size:14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.input-area input:focus{border-color:#C8102E}
.input-area input:disabled{opacity:.5;cursor:not-allowed}

.btn-red{background:#C8102E;color:#fff;border:none;border-radius:var(--border-radius-md);padding:8px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-red:hover{opacity:.88}
.btn-red:disabled{opacity:.4;cursor:not-allowed}

.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qbtn{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:20px;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);cursor:pointer;transition:all .15s}
.qbtn:hover{border-color:#C8102E;color:#C8102E}
.qbtn:disabled{opacity:.4;cursor:not-allowed}

.guess-area{display:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;margin-bottom:10px;background:var(--color-background-primary)}
.guess-area p{font-size:13px;color:var(--color-text-secondary);margin-bottom:8px}
.guess-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.guess-btn{padding:6px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:11px;text-align:center;cursor:pointer;background:var(--color-background-secondary);color:var(--color-text-primary);transition:all .15s}
.guess-btn:hover{border-color:#C8102E;background:var(--color-background-primary)}
.guess-btn .gb-av{font-size:18px;display:block;margin-bottom:2px}

.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 14px;font-size:12px;color:var(--color-text-secondary);text-align:center;flex:1;min-width:70px}
.stat span{display:block;font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.3}

.result-overlay{display:none;position:absolute;inset:0;background:rgba(255,248,231,.95);border-radius:var(--border-radius-lg);align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:2rem;z-index:20}
.result-overlay.show{display:flex}
.result-overlay h2{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.result-overlay .big{font-size:52px}
.result-overlay p{font-size:14px;color:var(--color-text-secondary);max-width:260px;line-height:1.6}

#arena{position:relative}
.thinking{display:inline-block;animation:blink 1s step-start infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>

<div id="gw" aria-label="Qual é o personagem? — Cara a Cara da Mendorato">

<div class="hdr">
  <span class="hdr-title">Qual é o personagem?</span>
  <div style="display:flex;gap:6px">
    <span class="badge" id="q-badge">0 perguntas</span>
    <span class="badge" id="alive-badge">8 vivos</span>
  </div>
</div>

<div class="stats-row">
  <div class="stat">Perguntas<span id="q-count">0</span></div>
  <div class="stat">Eliminados<span id="elim-count">0</span></div>
  <div class="stat">Recorde<span id="best">—</span></div>
</div>

<div id="arena">
  <div class="cards-grid" id="cards-grid"></div>

  <div class="chat-area" id="chat"></div>

  <div class="quick-btns" id="quick-btns">
    <button class="qbtn" onclick="ask('É do gênero feminino?')">Feminino?</button>
    <button class="qbtn" onclick="ask('É humano?')">É humano?</button>
    <button class="qbtn" onclick="ask('É vilão ou suspeito?')">É vilão?</button>
    <button class="qbtn" onclick="ask('Usa acessório?')">Usa acessório?</button>
    <button class="qbtn" onclick="ask('Está relacionado à comida?')">É comida?</button>
    <button class="qbtn" onclick="ask('É animal?')">É animal?</button>
    <button class="qbtn" onclick="ask('Tem cargo ou profissão?')">Tem cargo?</button>
    <button class="qbtn" onclick="toggleGuess()">Tenho um palpite!</button>
  </div>

  <div class="input-area">
    <input type="text" id="q-input" placeholder="Faça uma pergunta de sim/não..." maxlength="80" onkeydown="if(event.key==='Enter')sendQ()"/>
    <button class="btn-red" id="send-btn" onclick="sendQ()">Perguntar</button>
  </div>

  <div class="guess-area" id="guess-area">
    <p>Qual personagem você acha que é?</p>
    <div class="guess-grid" id="guess-grid"></div>
  </div>

  <div class="result-overlay" id="result-overlay"></div>
</div>

</div>

<script>
const CHARS = [
  {id:'gustavo', name:'Gustavo',  tag:'O Detetive',          avatar:'🕵️',
   attrs:{feminino:false, humano:true,  vilao:false, acessorio:true,  comida:false, animal:false, cargo:true,  jovem:false, usa_chapeu:true,  usa_oculos:false, trabalha_noite:true,  cor_cabelo:'castanho', magro:true,  usa_terno:true}},
  {id:'nanda',   name:'Nanda',    tag:'A Cronicamente Online', avatar:'🎲',
   attrs:{feminino:true,  humano:true,  vilao:false, acessorio:true,  comida:false, animal:false, cargo:false, jovem:true,  usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'preto',    magro:true,  usa_terno:false}},
  {id:'tutu',    name:'Tutu',     tag:'O Gamer',              avatar:'🎮',
   attrs:{feminino:false, humano:true,  vilao:false, acessorio:true,  comida:false, animal:false, cargo:false, jovem:true,  usa_chapeu:false, usa_oculos:false, trabalha_noite:true,  cor_cabelo:'preto',    magro:false, usa_terno:false}},
  {id:'guto',    name:'Guto',     tag:'O Festeiro',           avatar:'🎉',
   attrs:{feminino:false, humano:true,  vilao:false, acessorio:false, comida:false, animal:false, cargo:true,  jovem:true,  usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'castanho', magro:false, usa_terno:false}},
  {id:'pacoca',  name:'Paçoca',   tag:'A Cachorra Culpada',   avatar:'🐶',
   attrs:{feminino:true,  humano:false, vilao:true,  acessorio:false, comida:false, animal:true,  cargo:false, jovem:true,  usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'none',     magro:false, usa_terno:false}},
  {id:'mendorato',name:'Mendorato',tag:'O Pacote de Amendoim',avatar:'🥜',
   attrs:{feminino:false, humano:false, vilao:false, acessorio:false, comida:true,  animal:false, cargo:false, jovem:false, usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'none',     magro:false, usa_terno:false}},
  {id:'pacote',  name:'Pacote',   tag:'A Embalagem',          avatar:'📦',
   attrs:{feminino:false, humano:false, vilao:false, acessorio:false, comida:true,  animal:false, cargo:false, jovem:false, usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'none',     magro:false, usa_terno:false}},
  {id:'pista',   name:'Pista',    tag:'A Evidência',          avatar:'🔍',
   attrs:{feminino:false, humano:false, vilao:false, acessorio:false, comida:false, animal:false, cargo:false, jovem:false, usa_chapeu:false, usa_oculos:false, trabalha_noite:false, cor_cabelo:'none',     magro:false, usa_terno:false}},
];

const RULES = {
  'feminino':      c=>c.attrs.feminino,
  'humano':        c=>c.attrs.humano,
  'vilao':         c=>c.attrs.vilao || c.attrs.vilao===true,
  'acessorio':     c=>c.attrs.acessorio,
  'comida':        c=>c.attrs.comida,
  'animal':        c=>c.attrs.animal,
  'cargo':         c=>c.attrs.cargo,
  'jovem':         c=>c.attrs.jovem,
  'chapeu':        c=>c.attrs.usa_chapeu,
  'oculos':        c=>c.attrs.usa_oculos,
  'noite':         c=>c.attrs.trabalha_noite,
  'castanho':      c=>c.attrs.cor_cabelo==='castanho',
  'cabelo preto':  c=>c.attrs.cor_cabelo==='preto',
  'sem cabelo':    c=>c.attrs.cor_cabelo==='none',
  'magro':         c=>c.attrs.magro,
  'terno':         c=>c.attrs.usa_terno,
  'investigador':  c=>c.id==='gustavo',
  'cachorra':      c=>c.id==='pacoca',
  'amendoim':      c=>c.id==='mendorato'||c.id==='pacote',
  'inanimado':     c=>!c.attrs.humano && !c.attrs.animal,
};

function matchRule(q, char){
  const lq = q.toLowerCase();
  for(const [key, fn] of Object.entries(RULES)){
    if(lq.includes(key)) return fn(char);
  }
  return null;
}

function aiAnswer(q, chosen){
  const result = matchRule(q, chosen);
  if(result === null){
    const sims = ['Hmm, essa é interessante...', 'Preciso pensar...', 'Não tenho certeza de como responder isso...'];
    return {answer: null, text: sims[Math.floor(Math.random()*sims.length)] + ' Tente reformular!'};
  }
  const yesArr = ['Sim!','Isso mesmo!','Correto!','Sim, é verdade.','Com certeza!'];
  const noArr  = ['Não.','Incorreto.','Não é bem assim.','Não mesmo!','Negativo.'];
  return {
    answer: result,
    text: result ? yesArr[Math.floor(Math.random()*yesArr.length)] : noArr[Math.floor(Math.random()*noArr.length)]
  };
}

let chosen = null, qCount = 0, eliminated = [], bestRecord = null, guessOpen = false, waiting = false;

function init(){
  chosen = CHARS[Math.floor(Math.random()*CHARS.length)];
  qCount = 0; eliminated = []; guessOpen = false; waiting = false;
  renderCards();
  renderGuessGrid();
  updateStats();
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  addMsg('ai','🕵️ Pensei em um personagem. Faça perguntas de sim/não para descobrir quem é! Você pode clicar nos botões rápidos ou digitar sua própria pergunta.');
  setInputEnabled(true);
  document.getElementById('guess-area').style.display = 'none';
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('result-overlay').innerHTML = '';
}

function renderCards(){
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  CHARS.forEach(c => {
    const isElim = eliminated.includes(c.id);
    const div = document.createElement('div');
    div.className = 'pcard' + (isElim ? ' eliminated' : ' alive');
    div.id = 'card-'+c.id;
    div.innerHTML = `<span class="avatar">${c.avatar}</span><div class="pname">${c.name}</div><div class="ptag">${c.tag}</div><div class="elim-x">✕</div>`;
    grid.appendChild(div);
  });
}

function renderGuessGrid(){
  const gg = document.getElementById('guess-grid');
  gg.innerHTML = '';
  CHARS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'guess-btn';
    btn.innerHTML = `<span class="gb-av">${c.avatar}</span>${c.name}`;
    btn.onclick = () => makeGuess(c.id);
    gg.appendChild(btn);
  });
}

function updateStats(){
  const alive = CHARS.length - eliminated.length;
  document.getElementById('q-count').textContent = qCount;
  document.getElementById('elim-count').textContent = eliminated.length;
  document.getElementById('alive-badge').textContent = alive + ' vivo' + (alive!==1?'s':'');
  document.getElementById('q-badge').textContent = qCount + ' pergunta' + (qCount!==1?'s':'');
  document.getElementById('best').textContent = bestRecord !== null ? bestRecord+'p' : '—';
}

function addMsg(who, text){
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + who;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = who === 'ai' ? '🕵️' : '🎲';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = text;
  wrap.appendChild(av);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bub;
}

function setInputEnabled(on){
  document.getElementById('q-input').disabled = !on;
  document.getElementById('send-btn').disabled = !on;
  document.querySelectorAll('.qbtn').forEach(b => b.disabled = !on);
}

function sendQ(){
  const inp = document.getElementById('q-input');
  const q = inp.value.trim();
  if(!q || waiting) return;
  inp.value = '';
  ask(q);
}

function ask(q){
  if(waiting) return;
  waiting = true;
  setInputEnabled(false);
  addMsg('user', q);
  qCount++;
  updateStats();

  const thinkBub = addMsg('ai', '<span class="thinking">...</span>');
  setTimeout(()=>{
    const {answer, text} = aiAnswer(q, chosen);
    thinkBub.innerHTML = text;
    if(answer !== null){
      eliminateByAnswer(q, answer);
    }
    waiting = false;
    setInputEnabled(true);
    document.getElementById('q-input').focus();
  }, 600 + Math.random()*400);
}

function eliminateByAnswer(q, answer){
  let changed = false;
  CHARS.forEach(c => {
    if(eliminated.includes(c.id)) return;
    const result = matchRule(q, c);
    if(result === null) return;
    if(result !== answer){
      eliminated.push(c.id);
      const card = document.getElementById('card-'+c.id);
      if(card) card.className = 'pcard eliminated';
      changed = true;
    }
  });
  if(changed) updateStats();
  const alive = CHARS.filter(c=>!eliminated.includes(c.id));
  if(alive.length === 1 && alive[0].id === chosen.id){
    setTimeout(()=>{
      addMsg('ai', '🔍 Só sobrou um suspeito... você consegue adivinhar agora?');
    },400);
  }
}

function toggleGuess(){
  guessOpen = !guessOpen;
  document.getElementById('guess-area').style.display = guessOpen ? 'block' : 'none';
}

function makeGuess(id){
  if(waiting) return;
  const c = CHARS.find(x=>x.id===id);
  setInputEnabled(false);
  waiting = true;
  addMsg('user', 'Meu palpite é: '+c.avatar+' '+c.name+'!');

  setTimeout(()=>{
    if(id === chosen.id){
      if(bestRecord === null || qCount < bestRecord) bestRecord = qCount;
      updateStats();
      showResult(true, c);
    } else {
      addMsg('ai', 'Não! '+c.avatar+' '+c.name+' não é o personagem certo. Continue tentando!');
      const card = document.getElementById('card-'+id);
      if(card && !eliminated.includes(id)){
        eliminated.push(id);
        card.className = 'pcard eliminated';
        updateStats();
      }
      waiting = false;
      setInputEnabled(true);
    }
  }, 700);
}

function showResult(win, guessedChar){
  const ol = document.getElementById('result-overlay');
  const grade = qCount<=4?'S':qCount<=7?'A':qCount<=12?'B':'C';
  ol.innerHTML = `
    <div class="big">${win?chosen.avatar:'❓'}</div>
    <h2 style="color:${win?'#C8102E':'var(--color-text-primary)'}">${win?'Acertou! Era '+chosen.name+'!':'Era '+chosen.name+'!'}</h2>
    <p style="font-size:13px;color:var(--color-text-secondary)">${win?'Descobriu em '+qCount+' pergunta'+(qCount!==1?'s':'')+'! Nota '+grade+'.':'Que pena — o personagem era '+chosen.avatar+' '+chosen.name+' ('+chosen.tag+').'}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px">
      <button class="btn-red" onclick="init()">Jogar de novo</button>
      <button style="background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 16px;font-size:13px;cursor:pointer" onclick="shareResult(${win},${qCount},'${grade}','${chosen.name}')">Compartilhar</button>
    </div>`;
  ol.classList.add('show');
}

function shareResult(win, q, grade, name){
  if(win){
    sendPrompt('Descobri que o personagem era '+name+' em '+q+' perguntas no jogo Qual é o Personagem da Mendorato (nota '+grade+')! Cria um post divertido pra eu compartilhar?');
  } else {
    sendPrompt('Não consegui descobrir o personagem '+name+' no jogo Qual é o Personagem da Mendorato. Cria uma mensagem engraçada sobre isso?');
  }
}

init();
</script>
