
<style>
*{box-sizing:border-box;margin:0;padding:0}
#gw{padding:1rem 0;user-select:none}
#arena{
  position:relative;width:100%;height:420px;
  background:#FFF8E7;border:0.5px solid #E8A820;
  border-radius:var(--border-radius-lg);overflow:hidden;
  cursor:crosshair
}
#arena.shake{animation:shk .35s ease}
@keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

.pkg{
  position:absolute;font-size:28px;line-height:1;
  transition:transform .08s;cursor:pointer;
  animation:bob 1.4s ease-in-out infinite
}
.pkg.stolen{animation:fly .5s ease forwards}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes fly{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) rotate(120deg)}}

#pacoca{
  position:absolute;font-size:36px;line-height:1;
  transition:left .12s linear, top .12s linear;
  cursor:pointer;z-index:10
}
#pacoca.caught{animation:caught-anim .4s ease forwards}
@keyframes caught-anim{0%{transform:scale(1)}30%{transform:scale(1.6) rotate(-15deg)}100%{transform:scale(0) rotate(30deg);opacity:0}}
#pacoca.angry{animation:angry-anim .3s ease}
@keyframes angry-anim{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}

.pop{
  position:absolute;font-size:13px;font-weight:500;
  color:#C8102E;pointer-events:none;
  animation:pop-up .7s ease forwards;z-index:20
}
@keyframes pop-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}

#hud{
  display:flex;align-items:center;gap:10px;
  padding:0 4px;margin-bottom:10px;flex-wrap:wrap
}
#hud .stat{
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-md);
  padding:6px 14px;font-size:13px;
  color:var(--color-text-secondary);min-width:80px;text-align:center
}
#hud .stat span{display:block;font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1.2}
#timer-bar-wrap{flex:1;min-width:120px}
#timer-bar-bg{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
#timer-bar{height:100%;background:#C8102E;border-radius:4px;transition:width .1s linear}

.btn-red{background:#C8102E;color:#fff;border:none;border-radius:var(--border-radius-md);padding:9px 22px;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-red:hover{opacity:.88}
.btn-ghost{background:var(--color-background-secondary);color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 18px;font-size:14px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:#C8102E;color:#C8102E}

#overlay{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(255,248,231,.93);z-index:30;border-radius:var(--border-radius-lg)
}
#overlay h2{font-size:22px;font-weight:500;color:var(--color-text-primary)}
#overlay p{font-size:14px;color:var(--color-text-secondary);text-align:center;max-width:280px;line-height:1.6}
#overlay .big-score{font-size:48px;font-weight:500;color:#C8102E;line-height:1}
#overlay .sub{font-size:13px;color:var(--color-text-secondary)}

#diff-row{display:flex;gap:8px;margin-bottom:10px}
.diff-btn{flex:1;padding:5px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);font-size:12px;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.diff-btn.on{border-color:#C8102E;color:#C8102E;background:var(--color-background-primary);font-weight:500}

#lives-row{display:flex;gap:4px;align-items:center}
#lives-row .heart{font-size:16px;transition:all .2s}
#lives-row .heart.lost{opacity:.2;transform:scale(.8)}

#combo-badge{
  position:absolute;top:10px;right:12px;
  background:#C8102E;color:#fff;
  font-size:12px;font-weight:500;padding:3px 10px;
  border-radius:var(--border-radius-md);opacity:0;
  transition:opacity .3s;z-index:15
}
#combo-badge.show{opacity:1}
</style>

<div id="gw" aria-label="Pega o Amendoim — jogo de reflexos Mendorato">

<div id="diff-row">
  <button class="diff-btn on" id="d-facil"  onclick="setDiff(0)">Fácil</button>
  <button class="diff-btn"   id="d-medio"  onclick="setDiff(1)">Médio</button>
  <button class="diff-btn"   id="d-dificil" onclick="setDiff(2)">Difícil</button>
</div>

<div id="hud">
  <div class="stat">Pontos<span id="score-disp">0</span></div>
  <div class="stat">Roubados<span id="stolen-disp">0</span></div>
  <div id="timer-bar-wrap">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:3px;display:flex;justify-content:space-between">
      <span>Tempo</span><span id="time-disp">30s</span>
    </div>
    <div id="timer-bar-bg"><div id="timer-bar" style="width:100%"></div></div>
  </div>
  <div id="lives-row">
    <span class="heart" id="h0">🥜</span>
    <span class="heart" id="h1">🥜</span>
    <span class="heart" id="h2">🥜</span>
  </div>
</div>

<div id="arena">
  <div id="combo-badge">2x combo!</div>
  <div id="pacoca">🐶</div>

  <div id="overlay">
    <div style="font-size:48px">🥜🐶</div>
    <h2>Pega o Amendoim!</h2>
    <p>A Paçoca está roubando os pacotinhos de Mendorato. Clique nela para detê-la antes que acabe o tempo!</p>
    <button class="btn-red" onclick="startGame()">Começar</button>
  </div>
</div>

</div>

<script>
const DIFFS=[
  {speed:1.4,spawnRate:1800,pkgCount:6,label:'facil',time:30},
  {speed:2.2,spawnRate:1300,pkgCount:8,label:'medio',time:25},
  {speed:3.2,spawnRate:900, pkgCount:10,label:'dificil',time:20}
];

let diff=0, score=0, stolen=0, lives=3, running=false;
let pacocaX=50, pacocaY=50, vx=0, vy=0;
let timeLeft=30, timerInterval=null, moveRaf=null;
let packages=[], pkgId=0, combo=0, comboTimer=null;
let lastTarget=null, spawnTimer=null;
const ARENA_W=()=>document.getElementById('arena').clientWidth-40;
const ARENA_H=()=>document.getElementById('arena').clientHeight-40;

function setDiff(d){
  diff=d;
  ['d-facil','d-medio','d-dificil'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('on',i===d);
  });
  if(running) resetGame();
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  resetGame();
  running=true;
  timeLeft=DIFFS[diff].time;
  updateHUD();
  spawnPackages();
  startTimer();
  movePacoca();
}

function resetGame(){
  score=0; stolen=0; lives=3; combo=0;
  packages.forEach(p=>{if(p.el)p.el.remove()});
  packages=[];
  clearInterval(timerInterval); cancelAnimationFrame(moveRaf);
  clearTimeout(spawnTimer);
  updateHUD();
  updateLives();
  document.getElementById('pacoca').style.display='block';
  document.getElementById('pacoca').className='';
  document.getElementById('combo-badge').classList.remove('show');
  pacocaX=Math.random()*300+50; pacocaY=Math.random()*200+50;
  setVelocity();
}

function setVelocity(){
  const spd=DIFFS[diff].speed*(0.8+Math.random()*0.4);
  const angle=Math.random()*Math.PI*2;
  vx=Math.cos(angle)*spd; vy=Math.sin(angle)*spd;
}

function movePacoca(){
  if(!running){moveRaf=null;return;}
  const el=document.getElementById('pacoca');
  const aw=ARENA_W(), ah=ARENA_H();
  pacocaX+=vx; pacocaY+=vy;
  if(pacocaX<0){pacocaX=0;vx=Math.abs(vx)+(Math.random()-.5)*0.3;}
  if(pacocaX>aw){pacocaX=aw;vx=-Math.abs(vx)+(Math.random()-.5)*0.3;}
  if(pacocaY<0){pacocaY=0;vy=Math.abs(vy)+(Math.random()-.5)*0.3;}
  if(pacocaY>ah){pacocaY=ah;vy=-Math.abs(vy)+(Math.random()-.5)*0.3;}
  el.style.left=Math.round(pacocaX)+'px';
  el.style.top=Math.round(pacocaY)+'px';

  if(Math.random()<.005*(diff+1)) setVelocity();

  checkStealing();
  moveRaf=requestAnimationFrame(movePacoca);
}

function checkStealing(){
  packages.forEach(pkg=>{
    if(pkg.stolen) return;
    const dx=pacocaX-pkg.x, dy=pacocaY-pkg.y;
    if(Math.sqrt(dx*dx+dy*dy)<42){
      stealPackage(pkg);
    }
  });
}

function stealPackage(pkg){
  pkg.stolen=true;
  pkg.el.classList.add('stolen');
  showPop(pkg.x+10, pkg.y-10,'Roubado!');
  setTimeout(()=>{pkg.el&&pkg.el.remove();},500);
  packages=packages.filter(p=>p!==pkg);
  stolen++;
  combo=0;
  document.getElementById('combo-badge').classList.remove('show');
  lives--;
  updateLives();
  document.getElementById('arena').classList.add('shake');
  setTimeout(()=>document.getElementById('arena').classList.remove('shake'),350);
  if(lives<=0) endGame();
}

function spawnPackages(){
  if(!running) return;
  const d=DIFFS[diff];
  while(packages.length<d.pkgCount){
    addPackage();
  }
  spawnTimer=setTimeout(spawnPackages, d.spawnRate);
}

function addPackage(){
  const aw=ARENA_W(), ah=ARENA_H();
  const emojis=['🥜','📦','🥜','🥜','📦'];
  const el=document.createElement('div');
  el.className='pkg';
  el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  el.style.animationDelay=(Math.random()*1.4)+'s';
  const x=20+Math.random()*(aw-10);
  const y=20+Math.random()*(ah-10);
  el.style.left=Math.round(x)+'px';
  el.style.top=Math.round(y)+'px';
  document.getElementById('arena').appendChild(el);
  const pkg={id:pkgId++,x,y,el,stolen:false};
  packages.push(pkg);
}

function catchPacoca(e){
  if(!running) return;
  e.stopPropagation();
  const el=document.getElementById('pacoca');
  el.classList.add('caught');
  combo++;
  const pts=10*(combo>=3?2:1);
  score+=pts;
  showPop(pacocaX, pacocaY-10, combo>=3?'+'+pts+' COMBO!':'+'+pts);
  if(combo>=3){
    document.getElementById('combo-badge').textContent=combo+'x combo!';
    document.getElementById('combo-badge').classList.add('show');
    clearTimeout(comboTimer);
    comboTimer=setTimeout(()=>document.getElementById('combo-badge').classList.remove('show'),1500);
  }
  updateHUD();
  setTimeout(()=>{
    if(!running) return;
    el.className='';
    pacocaX=Math.random()*ARENA_W()*0.8+20;
    pacocaY=Math.random()*ARENA_H()*0.8+20;
    setVelocity();
    el.style.left=Math.round(pacocaX)+'px';
    el.style.top=Math.round(pacocaY)+'px';
  },400);
}

function showPop(x, y, txt){
  const p=document.createElement('div');
  p.className='pop'; p.textContent=txt;
  p.style.left=Math.round(x)+'px';
  p.style.top=Math.round(y)+'px';
  document.getElementById('arena').appendChild(p);
  setTimeout(()=>p.remove(),700);
}

function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateHUD();
    const bar=document.getElementById('timer-bar');
    const pct=timeLeft/DIFFS[diff].time*100;
    bar.style.width=Math.max(0,pct)+'%';
    bar.style.background=pct<25?'#E24B4A':pct<50?'#EF9F27':'#C8102E';
    if(timeLeft<=0) endGame();
  },1000);
}

function endGame(){
  running=false;
  clearInterval(timerInterval); cancelAnimationFrame(moveRaf);
  clearTimeout(spawnTimer);
  packages.forEach(p=>{if(p.el)p.el.remove()});
  packages=[];
  const ol=document.getElementById('overlay');
  const isWin=stolen<3&&lives>0;
  const grade=score>=200?'S':score>=120?'A':score>=60?'B':'C';
  const msg=isWin
    ?['Gustavo venceu! A Paçoca foi presa!','Você protegeu os amendoins da Mendorato. Bom trabalho, detetive!']
    :['A Paçoca escapou...','Os pacotinhos foram roubados. Tente de novo!'];
  ol.innerHTML=`
    <div style="font-size:44px">${isWin?'🏆':'🐶'}</div>
    <h2 style="color:${isWin?'#C8102E':'var(--color-text-primary)'}">${msg[0]}</h2>
    <div class="big-score">${score}</div>
    <div class="sub">pontos · grade ${grade} · ${stolen} roubados</div>
    <p>${msg[1]}</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn-red" onclick="startGame()">Jogar de novo</button>
      <button class="btn-ghost" onclick="shareScore(${score},'${grade}')">Compartilhar</button>
    </div>`;
  ol.style.display='flex';
}

function updateHUD(){
  document.getElementById('score-disp').textContent=score;
  document.getElementById('stolen-disp').textContent=stolen;
  document.getElementById('time-disp').textContent=timeLeft+'s';
}

function updateLives(){
  for(let i=0;i<3;i++){
    document.getElementById('h'+i).classList.toggle('lost',i>=lives);
  }
}

function shareScore(s,g){
  sendPrompt('Acabei de fazer '+s+' pontos (grade '+g+') no mini game "Pega o Amendoim" da Mendorato! A Paçoca tentou roubar os amendoins mas o Detetive Gustavo não deixou. Cria um post divertido pra eu compartilhar nas redes?');
}

document.getElementById('pacoca').addEventListener('click', catchPacoca);
document.getElementById('pacoca').addEventListener('touchstart', e=>{e.preventDefault();catchPacoca(e);},{passive:false});
</script>
